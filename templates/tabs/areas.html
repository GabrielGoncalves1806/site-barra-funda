<!-- ABA ÁREAS COMUNS -->
<div class="tab-content" id="tab-areas">
  <section id="areas" class="section">
    <div class="container">
      <div class="section__head">
        <h2>Áreas Comuns</h2>
        <p>
          Conheça os espaços de lazer e convivência do condomínio. Faça reservas pelo app Winker.
        </p>
      </div>

      <div class="cards" data-areas-root></div>

      <div class="callout">
        <div class="callout__title">Mercadinho</div>
        <p>
          O condomínio conta com um mercadinho de autoatendimento. Contato: (11) 99909-7730.
        </p>
      </div>
    </div>
  </section>

  <div class="modal" id="areaModal" aria-hidden="true">
    <div class="modal__overlay" data-modal-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="areaModalTitle" tabindex="-1">
      <button class="modal__close" type="button" data-modal-close aria-label="Fechar">×</button>
      <img src="" alt="" class="modal__image" id="areaModalImage" />
      <div class="modal__body">
        <p class="modal__tag" id="areaModalTag"></p>
        <h3 id="areaModalTitle"></h3>
        <p id="areaModalDescription" class="modal__description"></p>
        <ul id="areaModalHighlights" class="modal__list"></ul>
        <div id="areaModalMeta" class="modal__meta"></div>
      </div>
    </div>
  </div>

  {% include "partials/_footer.html" %}
</div>
